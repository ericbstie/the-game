name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format
        run: bunx biome format .

      - name: Test
        run: bun test

      - name: Compute next version
        id: version
        run: bun run scripts/next-version.ts

      - name: Bump and tag
        if: steps.version.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          next="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm pkg set version="$next"
          git commit -am "chore(release): v$next [skip ci]"
          git tag "v$next"
          git push origin HEAD:main --follow-tags

      - name: Compile standalone server executable
        if: steps.version.outputs.released == 'true'
        run: |
          next="${{ steps.version.outputs.next }}"
          bun run compile
          tar -czf "dist/breakout-box-server-v$next-linux-x64.tar.gz" -C dist breakout-box-server

      - name: Publish release with executable
        if: steps.version.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          next="${{ steps.version.outputs.next }}"
          gh release create "v$next" \
            --title "v$next" \
            --generate-notes \
            "dist/breakout-box-server-v$next-linux-x64.tar.gz"
